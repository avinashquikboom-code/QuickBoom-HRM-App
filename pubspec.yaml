name: quickboom_hrm
description: "HRM - Human Resource Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1
  socket_io_client: ^2.0.3+1

  # State Management - Riverpod
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI & Animations
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Charts & Analytics
  fl_chart: ^0.69.0

  # Calendar
  table_calendar: ^3.1.2

  # Media / Uploads
  image_picker: ^1.2.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.1.1
  local_auth: ^2.2.0
  remixicon: ^4.9.3
  geolocator: ^13.0.2
  url_launcher: ^6.3.0

  # Firebase
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.0

  # PDF generation & sharing
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.3


dev_dependencies:
  flutter_test:
    sdk: flutter

  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
